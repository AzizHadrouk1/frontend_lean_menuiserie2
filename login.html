<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion Admin — Diagnostic RAF</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3248;
      --accent: #4f8ef7;
      --accent-dim: #1e3a6a;
      --text: #e8eaf0;
      --text-muted: #7b82a0;
      --red: #f87171;
      --green: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(79,142,247,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(52,211,153,0.05) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px; width: 100%; max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      position: relative; z-index: 1;
    }
    .logo {
      text-align: center; margin-bottom: 32px;
    }
    .logo-icon {
      width: 52px; height: 52px; background: var(--accent-dim);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px; font-size: 24px;
    }
    .logo h1 { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); }
    .logo p { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.04em; }
    .form-group input {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      color: var(--text); font-family: inherit; font-size: 14px;
      transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); background: rgba(79,142,247,0.05); }

    .btn-login {
      width: 100%; padding: 14px; border-radius: 10px;
      background: var(--accent); border: none; color: white;
      font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.25s; margin-top: 8px;
      letter-spacing: 0.02em;
    }
    .btn-login:hover { background: #6fa3fa; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,142,247,0.3); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: var(--red);
      display: none; margin-bottom: 16px;
    }
    .error-msg.show { display: block; }

    .footer-note {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>Administration</h1>
      <p>Diagnostic Service Financier — RAF</p>
    </div>

    <div class="error-msg" id="errorMsg">Identifiants incorrects. Réessayez.</div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label>Identifiant</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="loginBtn">Se connecter</button>
    </form>

    <div class="footer-note">Accès réservé — Document confidentiel RAF</div>
  </div>

  <script>
    // If already logged in, redirect to admin
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/zied/dashboard';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorMsg');
      err.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Connexion...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = '/zied/dashboard';
        } else {
          err.textContent = data.message || 'Identifiants incorrects.';
          err.classList.add('show');
        }
      } catch {
        err.textContent = 'Erreur réseau. Vérifiez votre connexion.';
        err.classList.add('show');
      }

      btn.disabled = false;
      btn.textContent = 'Se connecter';
    });
  </script>
</body>
</html>
